openapi: "3.2.0"
info:
  title: Comprehensive Test API
  description: An exhaustive OpenAPI 3.2 specification for testing code generation
  version: "1.0.0"
  contact:
    name: Test
    email: test@example.com
  license:
    name: MIT
    identifier: MIT
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: https://api.example.com/v1
tags:
  - name: pets
    description: Pet operations
  - name: store
    description: Store operations
  - name: users
    description: User operations
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
      security: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            $ref: "#/components/schemas/PetStatus"
        - name: tags
          in: query
          description: Filter by tags
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: A list of pets
          headers:
            X-Total-Count:
              $ref: "#/components/headers/TotalCount"
            X-Page-Size:
              description: Number of items per page
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
        "400":
          $ref: "#/components/responses/BadRequest"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createPet
      summary: Create a pet
      tags:
        - pets
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        $ref: "#/components/requestBodies/NewPetBody"
      responses:
        "201":
          description: Pet created
          headers:
            Location:
              description: URL of created pet
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "400":
          $ref: "#/components/responses/BadRequest"
  /pets/{petId}:
    parameters:
      - $ref: "#/components/parameters/PetIdPath"
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags:
        - pets
      responses:
        "200":
          $ref: "#/components/responses/PetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updatePet
      summary: Update a pet
      tags:
        - pets
      requestBody:
        description: Pet data to update
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewPet"
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePet
      summary: Delete a pet
      tags:
        - pets
      security:
        - bearerAuth: []
          apiKey: []
      parameters:
        - name: X-Api-Key
          in: header
          description: API key for authorization
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Pet deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /pets/{petId}/image:
    post:
      operationId: uploadPetImage
      summary: Upload pet image
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        description: Image to upload
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  contentMediaType: image/*
                  contentEncoding: binary
                description:
                  type: string
              required:
                - file
      responses:
        "200":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageUploadResponse"
  /store/orders:
    post:
      operationId: placeOrder
      summary: Place an order
      tags:
        - store
      security:
        - oauth2:
            - write:pets
      requestBody:
        $ref: "#/components/requestBodies/OrderBody"
      responses:
        "201":
          $ref: "#/components/responses/OrderResponse"
        "400":
          description: Invalid order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /store/orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order by ID
      tags:
        - store
      parameters:
        - $ref: "#/components/parameters/OrderIdPath"
      responses:
        "200":
          $ref: "#/components/responses/OrderResponse"
        "404":
          description: Order not found
    delete:
      operationId: cancelOrder
      summary: Cancel an order
      tags:
        - store
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Order cancelled
        "404":
          description: Order not found
  /store/inventory:
    get:
      operationId: getInventory
      summary: Get store inventory
      tags:
        - store
      security:
        - oauth2:
            - read:pets
        - apiKey: []
      responses:
        "200":
          description: Inventory counts by status
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
  /users:
    post:
      operationId: createUser
      summary: Create user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          $ref: "#/components/responses/UserResponse"
  /users/{username}:
    parameters:
      - $ref: "#/components/parameters/UsernamePath"
    get:
      operationId: getUser
      summary: Get user by username
      tags:
        - users
      responses:
        "200":
          $ref: "#/components/responses/UserResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateUser
      summary: Update user
      tags:
        - users
      requestBody:
        $ref: "#/components/requestBodies/UserBody"
      responses:
        "200":
          description: User updated
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      summary: Delete user
      tags:
        - users
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
  /users/login:
    post:
      operationId: loginUser
      summary: User login
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          headers:
            X-Rate-Limit:
              $ref: "#/components/headers/RateLimit"
            X-Expires-After:
              description: Token expiration time
              schema:
                type: string
                format: date-time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 100
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          items:
            type: string
            format: uri
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        status:
          $ref: "#/components/schemas/PetStatus"
        metadata:
          type:
            - object
            - "null"
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    NewPet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        category:
          $ref: "#/components/schemas/Category"
        photoUrls:
          type: array
          items:
            type: string
            format: uri
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        status:
          type: string
          enum:
            - available
            - pending
            - sold
          default: available
    PetStatus:
      type: string
      enum:
        - available
        - pending
        - sold
      default: available
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    Order:
      type: object
      required:
        - petId
        - quantity
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        petId:
          type: integer
        quantity:
          type: integer
          minimum: 1
          maximum: 10
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - placed
            - approved
            - delivered
          default: placed
        complete:
          type: boolean
          default: false
    User:
      type: object
      required:
        - username
        - email
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          minLength: 1
          maxLength: 50
          pattern: "^[a-zA-Z0-9_]+$"
        firstName:
          type:
            - string
            - "null"
        lastName:
          type:
            - string
            - "null"
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          writeOnly: true
        phone:
          type:
            - string
            - "null"
        userStatus:
          type: integer
          description: User status
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expiresIn:
          type: integer
    ImageUploadResponse:
      type: object
      properties:
        code:
          type: integer
        type:
          type: string
        message:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
  parameters:
    PetIdPath:
      name: petId
      in: path
      description: Pet ID
      required: true
      schema:
        type: integer
    OrderIdPath:
      name: orderId
      in: path
      description: Order ID
      required: true
      schema:
        type: string
        format: uuid
    UsernamePath:
      name: username
      in: path
      description: Username
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 50
        pattern: "^[a-zA-Z0-9_]+$"
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: Number of items to skip
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    RequestIdHeader:
      name: X-Request-Id
      in: header
      description: Request correlation ID
      required: false
      schema:
        type: string
        format: uuid
  headers:
    TotalCount:
      description: Total number of items
      schema:
        type: integer
    RateLimit:
      description: Calls per hour allowed
      schema:
        type: integer
  requestBodies:
    NewPetBody:
      description: Pet to create
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NewPet"
    OrderBody:
      description: Order to place
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Order"
    UserBody:
      description: User data
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
  responses:
    PetResponse:
      description: Pet found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Pet"
    OrderResponse:
      description: Order found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Order"
    UserResponse:
      description: User found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/User"
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://example.com/oauth/authorize
          tokenUrl: https://example.com/oauth/token
          scopes:
            read:pets: Read access to pets
            write:pets: Write access to pets
security:
  - bearerAuth: []